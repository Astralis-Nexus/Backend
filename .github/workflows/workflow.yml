# Name shown in the GitHub Actions UI.
name: Continuous Integration

# Run CI when changes land on main or when a pull request targets main.
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  # Main CI job for building and testing the backend.
  ci:
    # Use a fresh Ubuntu runner for each CI run.
    runs-on: ubuntu-latest
    env:
      SONAR_HOST_URL: ${{ vars.SONAR_HOST_URL }}
      SONAR_PROJECT_KEY: ${{ vars.SONAR_PROJECT_KEY }}
      SONAR_ORGANIZATION: ${{ vars.SONAR_ORGANIZATION }}
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

    steps:
      # Download the repository code into the runner.
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Install Java 17 and cache Maven dependencies for faster runs.
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      # Compile the project, run tests, and execute Maven verification checks.
      - name: Build and test
        run: mvn --batch-mode verify

      # Kører kun SonarQube hvis alle nødvendige GitHub variables/secrets findes.
      - name: Run SonarQube analysis
        if: ${{ env.SONAR_HOST_URL != '' && env.SONAR_PROJECT_KEY != '' && env.SONAR_ORGANIZATION != '' && env.SONAR_TOKEN != '' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: >
          mvn -B -e --no-transfer-progress
          org.sonarsource.scanner.maven:sonar-maven-plugin:5.5.0.6356:sonar
          -Dsonar.projectKey=${{ env.SONAR_PROJECT_KEY }}
          -Dsonar.organization=${{ env.SONAR_ORGANIZATION }}
          -Dsonar.host.url=${{ env.SONAR_HOST_URL }}
          -Dsonar.token=${{ env.SONAR_TOKEN }}
