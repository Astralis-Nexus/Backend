name: Continuous Integration

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  ci:
    runs-on: ubuntu-latest

    env:
      SONAR_HOST_URL: ${{ vars.SONAR_HOST_URL }}
      SONAR_PROJECT_KEY: ${{ vars.SONAR_PROJECT_KEY }}
      SONAR_ORGANIZATION: ${{ vars.SONAR_ORGANIZATION }}
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

    steps:
      # Check out the repository so Maven can build and test the project.
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Install Java 17 and cache Maven dependencies between CI runs.
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      # Run only the unit tests under src/test/java/unit.
      - name: Run unit tests
        run: mvn --batch-mode --no-transfer-progress "-Dtest=unit.**.*Test" test

      # Run only the integration tests under src/test/java/integration.
      - name: Run integration tests
        run: mvn --batch-mode --no-transfer-progress "-Dtest=integration.**.*Test" test
      
      # Run only the api tests under src/test/java/api.
      - name: Run api tests
        run: mvn --batch-mode --no-transfer-progress "-Dtest=api.**.*Test" test

      # Generate a single JaCoCo report combining unit, integration and api coverage.
      - name: Generate JaCoCo report
        run: mvn --batch-mode --no-transfer-progress jacoco:report

      # Run SonarQube only when the required repository variables and secret are configured.
      - name: Run SonarQube analysis
        if: ${{ env.SONAR_HOST_URL != '' && env.SONAR_PROJECT_KEY != '' && env.SONAR_ORGANIZATION != '' && env.SONAR_TOKEN != '' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: >
          mvn -B -e --no-transfer-progress
          org.sonarsource.scanner.maven:sonar-maven-plugin:5.5.0.6356:sonar
          -Dsonar.projectKey=${{ env.SONAR_PROJECT_KEY }}
          -Dsonar.organization=${{ env.SONAR_ORGANIZATION }}
          -Dsonar.host.url=${{ env.SONAR_HOST_URL }}
          -Dsonar.token=${{ env.SONAR_TOKEN }}
          -Dsonar.coverage.jacoco.xmlReportPaths=target/site/jacoco/jacoco.xml
          -Dsonar.coverage.exclusions=src/main/java/application/Application.java
        #  -Dsonar.coverage.exclusions=**/application/config/**,**/persistence/config/**
        #  -Dsonar.sonar.coverage.exclusions=src/main/java/application/Application.java
