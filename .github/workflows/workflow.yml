name: Continuous Integration

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  # Kører backend-tests og samlet coverage.
  backend:
    name: Backend
    runs-on: ubuntu-latest

    env:
      SONAR_HOST_URL: ${{ vars.SONAR_HOST_URL }}
      SONAR_PROJECT_KEY: ${{ vars.SONAR_PROJECT_KEY }}
      SONAR_ORGANIZATION: ${{ vars.SONAR_ORGANIZATION }}
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

    steps:
      # Henter koden, så Maven kan bygge projektet.
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Installerer Java og cacher Maven dependencies.
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      # Kører unit-tests og gemmer coverage separat.
      - name: Run unit tests
        run: |
          mkdir -p target/jacoco-exec
          mvn --batch-mode --no-transfer-progress -Djacoco.destFile=target/jacoco-exec/unit.exec "-Dtest=unit.**.*Test" test

      # Kører integrationstests og gemmer coverage separat.
      - name: Run integration tests
        run: mvn --batch-mode --no-transfer-progress -Djacoco.destFile=target/jacoco-exec/integration.exec "-Dtest=integration.**.*Test" test

      # Kører API-tests og gemmer coverage separat.
      - name: Run API tests
        run: mvn --batch-mode --no-transfer-progress -Djacoco.destFile=target/jacoco-exec/api.exec "-Dtest=api.**.*Test" test

      # Samler unit, integration og API coverage.
      - name: Generate JaCoCo report
        run: mvn --batch-mode --no-transfer-progress test-compile jacoco:merge@merge-jacoco-exec jacoco:report

      # Sender samlet coverage til SonarQube, hvis secrets/vars findes.
      - name: Run SonarQube analysis
        if: ${{ env.SONAR_HOST_URL != '' && env.SONAR_PROJECT_KEY != '' && env.SONAR_ORGANIZATION != '' && env.SONAR_TOKEN != '' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: >
          mvn -B -e --no-transfer-progress
          org.sonarsource.scanner.maven:sonar-maven-plugin:5.5.0.6356:sonar
          -Dsonar.projectKey=${{ env.SONAR_PROJECT_KEY }}
          -Dsonar.organization=${{ env.SONAR_ORGANIZATION }}
          -Dsonar.host.url=${{ env.SONAR_HOST_URL }}
          -Dsonar.token=${{ env.SONAR_TOKEN }}
          -Dsonar.coverage.jacoco.xmlReportPaths=target/site/jacoco/jacoco.xml
          -Dsonar.coverage.exclusions=src/main/java/persistence/config/HibernateConfig.java,src/main/java/application/Application.java,src/main/java/controller/SecurityController.java,src/main/java/dto/GameDTO.java,src/main/java/dto/QADTO.java
          -Dsonar.exclusions=assignment-folder/**

  # Kører frontend/E2E i en separat worker.
  frontend:
    name: Frontend
    runs-on: ubuntu-latest

    steps:
      # Henter backend, frontend og E2E-tests.
      - name: Checkout
        uses: actions/checkout@v4

      # Installerer Java til backend-build.
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      # Installerer Node til Playwright.
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm

      # Installerer npm dependencies fra lockfilen.
      - name: Install frontend dependencies
        run: npm ci --ignore-scripts

      # Installerer Chromium og systempakker.
      - name: Install Playwright browser
        run: ./node_modules/.bin/playwright install --with-deps chromium

      # Starter PostgreSQL til E2E-backend.
      - name: Start PostgreSQL
        run: docker compose up -d postgres

      # Bygger backend uden tests.
      - name: Build backend
        run: mvn --batch-mode --no-transfer-progress -DskipTests package

      # Starter backend og venter på API'et.
      - name: Start backend
        run: |
          nohup java -jar target/app.jar > backend.log 2>&1 &
          for i in {1..30}; do
            if curl --silent --fail http://localhost:7007/api/games > /dev/null; then
              exit 0
            fi
            sleep 2
          done
          cat backend.log
          exit 1

      # Kører Playwright E2E-tests.
      - name: Run E2E tests
        run: ./node_modules/.bin/playwright test

      # Gemmer Playwright rapporten ved fejl.
      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          if-no-files-found: ignore

      # Gemmer backend-loggen ved fejl.
      - name: Upload backend log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-backend-log
          path: backend.log
          if-no-files-found: ignore
